services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-jira-postgres
    environment:
      POSTGRES_DB: mini_jira
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mini_jira_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mini_jira"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mini_jira_pg_data:
